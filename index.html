<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Amor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h2 { color: #c2185b; margin-bottom: 20px; }
        label { display: block; text-align: left; margin: 10px 0 5px; color: #880e4f; font-weight: bold; }
        
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #f8bbd0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: white;
            cursor: pointer;
        }

        button {
            background-color: #f06292;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { background-color: #ec407a; }

        /* Pantalla Sorpresa */
        #sorpresa {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .tarjeta-cerrada {
            background: #c2185b;
            color: white;
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(194, 24, 91, 0.4);
            animation: latido 1.5s infinite;
            text-align: center;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #galeria {
            display: none;
            width: 100%;
            max-width: 1200px; /* Aumentado para mejor visualización */
            margin-top: 30px;
        }

        /* --- NUEVO ESTILO DE GALERÍA DE FOTOS Y TEXTO --- */
        .galeria-fotos {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            padding: 10px;
        }

        .foto-card {
            flex: 1 1 calc(25% - 15px); /* Ajuste dinámico de tamaño */
            min-width: 250px; /* Evita que las tarjetas sean muy pequeñas */
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .foto {
            width: 100%;
            height: 200px; /* Altura normalizada para todas las fotos */
            object-fit: cover; /* --- AQUÍ ESTÁ LA MAGIA: hace que todas las fotos cubran el espacio de forma limpia --- */
            border-radius: 5px;
        }

        .foto-desc {
            font-size: 14px;
            margin-top: 10px;
            color: #880e4f;
            text-align: center;
            font-weight: bold;
        }

        .msg-amor { font-size: 24px; color: #ad1457; margin-bottom: 20px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="container" id="login-box">
        <h2>💖 Nuestro Inicio 💖</h2>
        
        <label>¿Cuál fue tu primer apodo?</label>
        <select id="apodo">
            <option value="">Selecciona uno...</option>
            <option value="Nae">Nae</option>
            <option value="bobocha">bobocha</option>
            <option value="Naieli">Naieli</option>
            <option value="Pandita">Pandita</option>
            <option value="Ronsoca">Ronsoca</option>
            <option value="Chinita del ande">Chinita del ande</option>
        </select>

        <label>¿Dónde nos vimos por primera vez?</label>
        <select id="lugar">
            <option value="">Selecciona el lugar...</option>
            <option value="tinkuy">tinkuy</option>
            <option value="biblioteca central">biblioteca central</option>
            <option value="entrada a sociales">entrada a sociales</option>
            <option value="comedor de artes">comedor de artes</option>
            <option value="muyurina">muyurina</option>
        </select>

        <label>Fecha de nuestra 1era cita</label>
        <select id="fecha">
            <option value="">Selecciona la fecha...</option>
            <option value="30/04/2024">30/04/2024</option>
            <option value="08/11/2025">08/11/2025</option>
            <option value="14/11/2025">14/11/2025</option>
            <option value="22/12/2025">22/12/2025</option>
        </select>

        <label>Por último... tu código de la U</label>
        <select id="codigo">
            <option value="">Selecciona tu código...</option>
            <option value="20184451">20184451</option>
            <option value="20191758">20191758</option>
            <option value="20201532">20201532</option>
            <option value="20210045">20210045</option>
        </select>

        <button onclick="validar()">Ingresar ❤️</button>
    </div>

    <div id="sorpresa">
        <div class="msg-amor">¡FELICES 2 MESES AMORZITO! ❤️</div>
        
        <div class="tarjeta-cerrada" id="btn-abrir" onclick="abrirCarta()">
            🎁 Tienes una tarjeta: ABRIR
        </div>

        <div id="galeria">
            <p style="color: #ad1457; text-align: center; font-weight: bold;">Nuestros mejores momentos:</p>
            <div id="contenedor-fotos" class="galeria-fotos">
                </div>
        </div>

        <audio id="musica" loop>
            <source src="NO RECOMENDABLE - Emma.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // --- NUEVA FUNCIÓN PARA CARGAR FOTOS CON TEXTO ---
        // Aquí puedes cambiar los textos para cada foto
        const descripcionesFotos = [
            "Nuestro primer viaje juntos en el parque",
            "Tú y yo, siempre en Lima",
            "Una cena súper romántica",
            "Nuestro mejor día en la U",
            "Abrazos infinitos que me hacen feliz",
            "Tu mirada de amor me desarma",
            "Juntos en el parque, nuestro lugar favorito",
            "Nuestra primera foto de tantas",
            "Tú y yo, para siempre",
            "Momentos inolvidables que guardaré",
            "¡Felices dos meses, amor de mi vida!",
            "Tú eres mi felicidad",
            "Juntos, nada nos falta",
            "Nuestro amor es eterno",
            "Tú eres mi todo y más"
        ];

        function validar() {
            const apo = document.getElementById('apodo').value;
            const lug = document.getElementById('lugar').value;
            const fec = document.getElementById('fecha').value;
            const cod = document.getElementById('codigo').value;

            if (apo === "Naieli" && lug === "entrada a sociales" && fec === "14/11/2025" && cod === "20191758") {
                document.getElementById('login-box').style.display = 'none';
                document.body.style.display = 'block'; 
                document.getElementById('sorpresa').style.display = 'flex';
                const audio = document.getElementById('musica');
                audio.play().catch(e => console.log("Audio esperando interacción"));
            } else {
                alert("Mmm... algo no cuadra, revisa bien tus respuestas, amor ❤️");
            }
        }

        function abrirCarta() {
            document.getElementById('btn-abrir').style.display = 'none';
            const galeria = document.getElementById('galeria');
            galeria.style.display = 'block';
            
            const contenedor = document.getElementById('contenedor-fotos');
            contenedor.innerHTML = ""; // Limpiar contenido anterior si lo hubiera

            // Carga automática de las 15 fotos .jpeg dentro de tarjetas con texto
            for (let i = 1; i <= 15; i++) {
                // 1. Crear el contenedor de la tarjeta
                const fotoCard = document.createElement('div');
                fotoCard.className = 'foto-card';

                // 2. Crear la imagen
                const img = document.createElement('img');
                img.src = `foto${i}.jpeg`;
                img.className = 'foto';
                fotoCard.appendChild(img);

                // 3. Crear el texto descriptivo
                const descText = document.createElement('p');
                descText.className = 'foto-desc';
                // Usar texto genérico si no hay descripción definida para esa foto
                descText.textContent = descripcionesFotos[i - 1] || `Nuestro momento inolvidable ${i}`;
                fotoCard.appendChild(descText);

                // 4. Agregar la tarjeta completa al contenedor principal
                contenedor.appendChild(fotoCard);
            }

            document.getElementById('musica').play();
        }
    </script>
</body>
</html>
